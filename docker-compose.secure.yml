services:
  app:
    build: .
    # Note: No ports mapping here. App is only accessible via the 'nginx' service.
    volumes:
      - amsos-uploads:/app/public/uploads
      - amsos-db:/app/prisma/data
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL:-file:/app/prisma/data/dev.db}
      - NODE_ENV=${NODE_ENV:-production}
      - SSO_CLIENT_ID=${SSO_CLIENT_ID}
      - SSO_CLIENT_SECRET=${SSO_CLIENT_SECRET}
      - SSO_ISSUER_URL=${SSO_ISSUER_URL}
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  amsos-uploads:
  amsos-db:
