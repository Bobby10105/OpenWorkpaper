name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '28 17 * * 3'

env:
  # Opt into Node.js 24 as recommended by GitHub deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24' # Future-proofed to Node 24
        cache: 'npm'

    - name: Install dependencies and Generate Prisma
      run: |
        npm ci
        npx prisma generate

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4 # Upgraded to v4
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4 # Upgraded to v4
      with:
        category: "/language:${{matrix.language}}"
