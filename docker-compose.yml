services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app:z
      - /app/node_modules
      - /app/.next
      - uploads-data:/app/public/uploads
      - db-data:/app/prisma/data
    environment:
      - DATABASE_URL=${DATABASE_URL:-file:/app/prisma/data/dev.db}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_DURATION_SECONDS=${SESSION_DURATION_SECONDS:-3600}
      - NODE_ENV=${NODE_ENV:-development}
    restart: always

volumes:
  uploads-data:
  db-data:
